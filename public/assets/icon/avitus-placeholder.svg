<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="url(#bg-avitus)"/>
  <defs>
    <linearGradient id="bg-avitus" x1="0" y1="0" x2="400" y2="300">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>
  <!-- Grid pattern -->
  <g opacity="0.1" stroke="#60a5fa" stroke-width="0.5">
    <line x1="50" y1="0" x2="50" y2="300"/><line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="250" y1="0" x2="250" y2="300"/><line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="350" y1="0" x2="350" y2="300"/>
    <line x1="0" y1="50" x2="400" y2="50"/><line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
  </g>
  <!-- Box icon -->
  <rect x="160" y="90" width="80" height="60" rx="6" stroke="#60a5fa" stroke-width="2.5" fill="none"/>
  <path d="M160 105 L200 120 L240 105" stroke="#60a5fa" stroke-width="2" fill="none"/>
  <line x1="200" y1="120" x2="200" y2="150" stroke="#60a5fa" stroke-width="2"/>
  <!-- Branch dots -->
  <circle cx="140" cy="180" r="6" fill="#3b82f6" opacity="0.7"/>
  <circle cx="200" cy="180" r="6" fill="#60a5fa"/>
  <circle cx="260" cy="180" r="6" fill="#3b82f6" opacity="0.7"/>
  <line x1="146" y1="180" x2="194" y2="180" stroke="#60a5fa" stroke-width="1.5" opacity="0.5"/>
  <line x1="206" y1="180" x2="254" y2="180" stroke="#60a5fa" stroke-width="1.5" opacity="0.5"/>
  <!-- Text -->
  <text x="200" y="220" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="18" font-weight="700">Avitus IMS</text>
  <text x="200" y="242" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="11" opacity="0.8">Nationwide Inventory System</text>
</svg>
